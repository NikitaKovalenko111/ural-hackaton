openapi: 3.0.3
info:
  title: ural-hackaton API
  version: 1.1.0
  description: Updated API documentation aligned with current Fiber controllers.
servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Auth
  - name: Users
  - name: Admins
  - name: Mentors
  - name: Hubs
  - name: Events
  - name: Requests
  - name: Bookings

paths:
  /auth/request:
    post:
      tags: [Auth]
      summary: Request magic link by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestMagicLinkDto"
      responses:
        "200":
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/request/dev:
    post:
      tags: [Auth]
      summary: Request magic link in local development mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestMagicLinkDto"
      responses:
        "200":
          description: Magic link generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestMagicLinkDevResponse"

  /auth/verify:
    get:
      tags: [Auth]
      summary: Verify magic link token and create session cookie
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "401":
          description: Invalid or expired token

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user by session cookie
      responses:
        "200":
          description: Session user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      tags: [Auth]
      summary: Clear session cookie
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users:
    post:
      tags: [Users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserDto"
      responses:
        "201":
          description: User created
        "400":
          description: Invalid payload

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found

  /users/search:
    get:
      tags: [Users]
      summary: Get user by fullname
      parameters:
        - in: query
          name: fullname
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found

  /admins/:
    get:
      tags: [Admins]
      summary: Get all admins
      responses:
        "200":
          description: Admin list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminJoinUser"
    post:
      tags: [Admins]
      summary: Create admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdminDto"
      responses:
        "201":
          description: Admin created

  /admins/{id}:
    get:
      tags: [Admins]
      summary: Get admin by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Admin found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminJoinUser"
        "404":
          description: Admin not found
    delete:
      tags: [Admins]
      summary: Delete admin
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Deleted

  /mentors:
    post:
      tags: [Mentors]
      summary: Create mentor relation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMentorDto"
      responses:
        "201":
          description: Mentor created

  /mentors/{id}:
    get:
      tags: [Mentors]
      summary: Get mentor by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Mentor found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorJoinUser"
        "404":
          description: Mentor not found

  /mentors/search:
    get:
      tags: [Mentors]
      summary: Get mentors by fullname
      parameters:
        - in: query
          name: fullname
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Mentor list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MentorJoinUser"
        "404":
          description: Mentors not found

  /hubs/:
    get:
      tags: [Hubs]
      summary: Get all hubs
      responses:
        "200":
          description: Hub list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hub"
    post:
      tags: [Hubs]
      summary: Create hub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHubDto"
      responses:
        "201":
          description: Hub created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hub"
    put:
      tags: [Hubs]
      summary: Update hub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Hub"
      responses:
        "200":
          description: Hub updated

  /hubs/search:
    get:
      tags: [Hubs]
      summary: Search hubs
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hub list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hub"

  /hubs/{id}:
    get:
      tags: [Hubs]
      summary: Get hub by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Hub found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hub"
        "404":
          description: Hub not found
    delete:
      tags: [Hubs]
      summary: Delete hub
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Deleted

  /events/:
    get:
      tags: [Events]
      summary: Get all events
      responses:
        "200":
          description: Event list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      tags: [Events]
      summary: Create event (mentor or admin session required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventDto"
      responses:
        "201":
          description: Event created
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    put:
      tags: [Events]
      summary: Update event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Event"
      responses:
        "200":
          description: Event updated

  /events/search:
    get:
      tags: [Events]
      summary: Search events by name
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      tags: [Events]
      summary: Get event by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Event found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Event not found
    delete:
      tags: [Events]
      summary: Delete event
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Deleted

  /requests:
    post:
      tags: [Requests]
      summary: Create request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRequestDto"
      responses:
        "201":
          description: Request created

  /requests/{id}:
    get:
      tags: [Requests]
      summary: Get request by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Request found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Request"
        "404":
          description: Request not found

  /requests/user/{user_id}:
    get:
      tags: [Requests]
      summary: Get requests by user id
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Request list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Request"

  /bookings/:
    get:
      tags: [Bookings]
      summary: Get all bookings
      responses:
        "200":
          description: Booking list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      tags: [Bookings]
      summary: Create booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingDto"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
    put:
      tags: [Bookings]
      summary: Update booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Booking"
      responses:
        "200":
          description: Booking updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      tags: [Bookings]
      summary: Get booking by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Booking found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Booking not found
    delete:
      tags: [Bookings]
      summary: Delete booking
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Deleted

  /bookings/user/{user_id}:
    get:
      tags: [Bookings]
      summary: Get bookings by user id
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Booking list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

components:
  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string

    RequestMagicLinkDto:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    RequestMagicLinkDevResponse:
      type: object
      properties:
        message:
          type: string
        magic_link:
          type: string

    AuthUser:
      type: object
      properties:
        id:
          type: integer
          format: int64
        fullname:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        telegram:
          type: string
        phone:
          type: string

    AuthSessionResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"

    CreateUserDto:
      type: object
      required: [fullname, user_role]
      properties:
        fullname:
          type: string
        user_role:
          type: string
        email:
          type: string
          format: email
        telegram:
          type: string
        phone:
          type: string
        hub_id:
          type: integer
          format: int64

    User:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        fullname:
          type: string
        user_role:
          type: string
        email:
          type: string
        telegram:
          type: string
        phone:
          type: string

    CreateAdminDto:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: integer
          format: int64

    AdminJoinUser:
      allOf:
        - type: object
          properties:
            admin_id:
              type: integer
              format: int64
        - $ref: "#/components/schemas/User"

    CreateMentorDto:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: integer
          format: int64
        hub_id:
          type: integer
          format: int64

    MentorJoinUser:
      allOf:
        - type: object
          properties:
            mentor_id:
              type: integer
              format: int64
            hub_id:
              type: integer
              format: int64
        - $ref: "#/components/schemas/User"

    CreateHubDto:
      type: object
      required: [hub_name, address, status, city]
      properties:
        hub_name:
          type: string
        address:
          type: string
        status:
          type: string
        city:
          type: string
        description:
          type: string
        schedule:
          type: string
        occupancy:
          type: integer

    Hub:
      type: object
      properties:
        hub_id:
          type: integer
          format: int64
        hub_name:
          type: string
        address:
          type: string
        status:
          type: string
        city:
          type: string
        description:
          type: string
        schedule:
          type: string
        occupancy:
          type: integer

    CreateEventDto:
      type: object
      required: [name, description, start_time, end_time, hub_id]
      properties:
        name:
          type: string
        description:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        hub_id:
          type: integer
          format: int64
        mentor_id:
          type: integer
          format: int64

    Event:
      type: object
      properties:
        event_id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        hub_id:
          type: integer
          format: int64
        mentor_id:
          type: integer
          format: int64

    CreateRequestDto:
      type: object
      required: [request_message, user_id]
      properties:
        request_message:
          type: string
        user_id:
          type: integer
          format: int64
        mentor_id:
          type: integer
          format: int64

    Request:
      type: object
      properties:
        request_id:
          type: integer
          format: int64
        request_message:
          type: string
        user_id:
          type: integer
          format: int64
        mentor_id:
          type: integer
          format: int64

    CreateBookingDto:
      type: object
      required: [booking_date, booking_zone, booking_slots, user_id]
      properties:
        booking_date:
          type: string
          format: date-time
        booking_zone:
          type: string
        booking_slots:
          type: integer
        user_id:
          type: integer
          format: int64

    Booking:
      type: object
      properties:
        booking_id:
          type: integer
          format: int64
        booking_date:
          type: string
        booking_zone:
          type: string
        booking_slots:
          type: integer
        user_id:
          type: integer
          format: int64
